<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Tracker{% endblock %}</title>
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    {% from "_icons.html" import icon %}
    <nav class="navbar">
        <a class="navbar__brand" href="/">
            {{ icon('history') }}
            <span>Job Tracker</span>
        </a>
        <div class="navbar__nav">
            <a class="btn btn--sm {% if request.path == '/' %}btn--primary{% else %}btn--outline{% endif %}"
               href="/">{{ _('Dashboard') }}</a>
            <a class="btn btn--sm {% if request.path == '/settings' %}btn--primary{% else %}btn--outline{% endif %}"
               href="/settings">
                {{ icon('settings') }} {{ _('Settings') }}
            </a>
            <div class="dropdown" id="lang-dropdown">
                <button class="btn btn--outline btn--sm" type="button"
                        onclick="toggleDropdown('lang-dropdown')" aria-expanded="false"
                        title="{{ _('Language') }}">
                    {{ icon('languages') }}
                    <span>{{ current_lang.upper() }}</span>
                </button>
                <ul class="dropdown__menu">
                    <li><a class="dropdown__item lang-switch" data-lang="pt_BR" href="#">Português (Brasil)</a></li>
                    <li><a class="dropdown__item lang-switch" data-lang="en" href="#">English</a></li>
                </ul>
            </div>
            <button class="btn btn--outline btn--sm btn--icon" id="theme-toggle" title="{{ _('Toggle theme') }}">
                {{ icon('sun-moon') }}
            </button>
        </div>
    </nav>

    <main class="container py-3">
        {% block content %}{% endblock %}
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script>
      window.currentLang = "{{ current_lang }}";
      window.i18n = {
        active: "{{ _('Active') }}",
        paused: "{{ _('Paused') }}",
        completed: "{{ _('Completed') }}",
        today: "{{ _('Today') }}",
        no_shift: "{{ _('No shift') }}",
        no_activities: "{{ _('No activities recorded') }}",
        loading: "{{ _('Loading...') }}",
        activity_updated: "{{ _('Activity updated!') }}",
        activity_removed: "{{ _('Activity removed.') }}",
        shifts_saved: "{{ _('Shifts saved!') }}",
        settings_saved: "{{ _('Settings saved!') }}",
        pick_dates: "{{ _('Select the dates.') }}",
        now: "{{ _('now') }}",
        close: "{{ _('Close') }}",
        monday: "{{ _('Monday') }}",
        tuesday: "{{ _('Tuesday') }}",
        wednesday: "{{ _('Wednesday') }}",
        thursday: "{{ _('Thursday') }}",
        friday: "{{ _('Friday') }}",
        saturday: "{{ _('Saturday') }}",
        sunday: "{{ _('Sunday') }}"
      };
    </script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

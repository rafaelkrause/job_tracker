name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build babel

      - name: Compile translation catalogs
        run: pybabel compile -d app/i18n

      - name: Build sdist and wheel
        run: python -m build

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Extract changelog section
        id: changelog
        env:
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          tag = os.environ["RELEASE_TAG"]
          version = tag.lstrip("v")
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          match = re.search(pattern, text, re.DOTALL)
          body = match.group(1).strip() if match else f"Release {tag}"
          out = pathlib.Path("RELEASE_BODY.md")
          out.write_text(body, encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"path={out}\n")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          body_path: ${{ steps.changelog.outputs.path }}
          files: |
            dist/*.tar.gz
            dist/*.whl
          draft: false
          prerelease: false
          generate_release_notes: false

  installer:
    name: Build Windows installer
    needs: [build, release]
    uses: ./.github/workflows/build-installer.yml
    with:
      version: ${{ needs.build.outputs.version }}
      tag: ${{ needs.build.outputs.tag }}
    secrets: inherit

name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão (ex: 1.0.0)"
        required: true
        default: "1.0.0"
      tag:
        description: "Tag para anexar o .exe (ex: v1.0.0). Vazio = não anexa."
        required: false
        default: ""
  workflow_call:
    inputs:
      version:
        description: "Version without leading v (e.g. 1.0.0)"
        required: true
        type: string
      tag:
        description: "Release tag to attach the installer to (e.g. v1.0.0)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolver versão
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolver tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Instalar NSIS
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis

      - name: Cache de downloads (Python embeddable + NSSM)
        uses: actions/cache@v5
        with:
          path: installer/.cache
          key: installer-cache-py3.11.9-nssm2.24

      - name: Build
        run: ./installer/build_installer.sh "${{ steps.version.outputs.value }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimeTrack-Setup-${{ steps.version.outputs.value }}
          path: installer/TimeTrack-Setup-${{ steps.version.outputs.value }}.exe
          if-no-files-found: error

      - name: Anexar ao release
        if: steps.tag.outputs.value != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: installer/TimeTrack-Setup-${{ steps.version.outputs.value }}.exe
